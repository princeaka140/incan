# Cargo Deny Configuration
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Security vulnerability database checks
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# cargo-deny v0.16+ expects `unmaintained` to specify the *scope* of the check.
# Valid values: ["all", "workspace", "transitive", "none"].
unmaintained = "transitive"
yanked = "warn"
ignore = [
    # transitive-only; no safe upgrade currently available, tracked in GitHub issue #260
    "RUSTSEC-2023-0089", # atomic-polyfill
]

[licenses]
# License policy
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
# Ignore private workspace members
ignore = false
registries = []

[bans]
# Dependency bans
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = [
    # Upstream currently pins two unicode-width lines through miette/textwrap and wat/wast.
    # Keep bans output clean while we track upstream convergence separately.
    { name = "unicode-width", version = "0.1.14" },
]
skip-tree = [
    # Upstream-locked duplicate trees:
    # - rust-analyzer crates (ra_ap_*) pull older hashbrown/foldhash/winnow lines
    # - wasmtime/wasi stack pulls a separate native/runtime dependency graph
    { name = "ra_ap_load-cargo", version = "0.0.325" },
    { name = "wasmtime-wasi", version = "43.0.1" },
]

[sources]
# Source repository checks
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
# Allow GitHub organizations
github = []
gitlab = []
bitbucket = []
