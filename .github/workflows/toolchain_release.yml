name: Incan Toolchain Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-toolchain:
    name: Package toolchain (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1,${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: incan-${{ matrix.target }}
          cache-workspace-crates: "true"
      - name: Build toolchain commands
        run: cargo build --locked --release --features lsp --target "${{ matrix.target }}" --bin incan --bin incan-lsp
      - name: Package archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          INCAN_BIN: target/${{ matrix.target }}/release/incan
          INCAN_LSP_BIN: target/${{ matrix.target }}/release/incan-lsp
        run: workspaces/release/toolchain/package_archive.sh "${TARGET}"
      - uses: actions/upload-artifact@v6
        with:
          name: incan-toolchain-${{ matrix.target }}
          path: |
            incan-*.tar.gz
            incan-*.tar.gz.sha256
            toolchain-version.txt
            toolchain-release.txt
          if-no-files-found: error

  publish-toolchain:
    name: Publish toolchain manifest and archives
    runs-on: ubuntu-latest
    needs: package-toolchain
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          pattern: incan-toolchain-*
          path: dist/toolchain
          merge-multiple: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: incan-publish
          cache-workspace-crates: "true"
      - name: Bootstrap packaged Incan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/toolchain-bootstrap
          tar -xzf dist/toolchain/incan-*-x86_64-unknown-linux-gnu.tar.gz -C dist/toolchain-bootstrap
          dist/toolchain-bootstrap/bin/incan --version
      - name: Write release manifest
        shell: bash
        env:
          INCAN_REPO_ROOT: ${{ github.workspace }}
          INCAN_TOOLCHAIN_DIST_DIR: ${{ github.workspace }}/dist/toolchain
        run: |
          set -euo pipefail
          export INCAN_TOOLCHAIN_GENERATED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          dist/toolchain-bootstrap/bin/incan run workspaces/release/toolchain/prepare_assets.incn
      - name: Package npm installer
        run: node workspaces/release/npm/prepare_package.js dist/toolchain
      - name: Package Python installer
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade build hatchling
          python3 workspaces/release/pip/prepare_package.py dist/toolchain
      - name: Smoke generated toolchain installers
        shell: bash
        env:
          TOOLCHAIN_DIST: ${{ github.workspace }}/dist/toolchain
          TOOLCHAIN_HOST_TARGET: x86_64-unknown-linux-gnu
          TOOLCHAIN_INCAN_BIN: dist/toolchain-bootstrap/bin/incan
        run: |
          set -euo pipefail
          bash workspaces/release/toolchain/local_smoke.sh direct
          bash workspaces/release/toolchain/local_smoke.sh npm
          bash workspaces/release/toolchain/local_smoke.sh pip
          bash workspaces/release/toolchain/local_smoke.sh homebrew
      - name: Upload toolchain assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/toolchain/incan-*.tar.gz
            dist/toolchain/incan-*.tar.gz.sha256
            dist/toolchain/manifest.json
            dist/toolchain/toolchain-manifest.schema.v1.json
            dist/toolchain/install.sh
            dist/toolchain/incan.rb
            dist/toolchain/incan-toolchain-*.tgz
            dist/toolchain/incan-*.whl
            dist/toolchain/incan-[0-9]*.tar.gz
      - uses: actions/upload-artifact@v6
        with:
          name: incan-toolchain-manifest
          path: |
            dist/toolchain/manifest.json
            dist/toolchain/toolchain-manifest.schema.v1.json
            dist/toolchain/install.sh
            dist/toolchain/incan.rb
            dist/toolchain/incan-toolchain-*.tgz
            dist/toolchain/incan-*.whl
            dist/toolchain/incan-[0-9]*.tar.gz
          if-no-files-found: error

  publish-npm:
    name: Publish npm installer package
    runs-on: ubuntu-latest
    needs: publish-toolchain
    if: startsWith(github.ref, 'refs/tags/')
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: incan-toolchain-manifest
          path: dist/toolchain
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Publish npm installer package
        shell: bash
        run: npm publish dist/toolchain/incan-toolchain-*.tgz --access public --provenance

  publish-pypi:
    name: Publish Python installer package
    runs-on: ubuntu-latest
    needs: publish-toolchain
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: incan-toolchain-manifest
          path: dist/toolchain
      - name: Stage PyPI distributions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/pypi
          cp dist/toolchain/incan-*.whl dist/toolchain/incan-[0-9]*.tar.gz dist/pypi/
      - name: Publish Python installer package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi
          skip-existing: true
