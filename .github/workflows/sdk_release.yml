name: Incan SDK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-sdk:
    name: Package SDK (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: incan-sdk-${{ matrix.target }}
          cache-workspace-crates: "true"
      - name: Build SDK commands
        run: cargo build --locked --release --features lsp --bin incan --bin incan-lsp
      - name: Package archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: workspaces/release/sdk/package_archive.sh "${TARGET}"
      - uses: actions/upload-artifact@v6
        with:
          name: incan-sdk-${{ matrix.target }}
          path: |
            incan-*.tar.gz
            incan-*.tar.gz.sha256
            sdk-version.txt
            sdk-release.txt
          if-no-files-found: error

  publish-sdk:
    name: Publish SDK manifest and archives
    runs-on: ubuntu-latest
    needs: package-sdk
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          pattern: incan-sdk-*
          path: dist/sdk
          merge-multiple: true
      - name: Write release manifest
        run: python3 workspaces/release/sdk/prepare_assets.py dist/sdk
      - name: Package npm installer
        run: node workspaces/release/npm/prepare_package.js dist/sdk
      - name: Package Python installer
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade build hatchling
          python3 workspaces/release/pip/prepare_package.py dist/sdk
      - name: Upload SDK assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/sdk/incan-*.tar.gz
            dist/sdk/incan-*.tar.gz.sha256
            dist/sdk/manifest.json
            dist/sdk/sdk-manifest.schema.v1.json
            dist/sdk/install.sh
            dist/sdk/incan.rb
            dist/sdk/incan-sdk-*.tgz
            dist/sdk/incan_sdk-*.whl
            dist/sdk/incan_sdk-*.tar.gz
      - name: Publish npm installer package
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: workspaces/release/npm/publish_package.sh dist/sdk
      - name: Publish Python installer package
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: workspaces/release/pip/publish_package.sh dist/sdk
      - uses: actions/upload-artifact@v6
        with:
          name: incan-sdk-manifest
          path: |
            dist/sdk/manifest.json
            dist/sdk/sdk-manifest.schema.v1.json
            dist/sdk/install.sh
            dist/sdk/incan.rb
            dist/sdk/incan-sdk-*.tgz
            dist/sdk/incan_sdk-*.whl
            dist/sdk/incan_sdk-*.tar.gz
          if-no-files-found: error
