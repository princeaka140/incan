name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  INCAN_NO_BANNER: 1

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Comment wrapping (comment_width/wrap_comments/format_code_in_doc_comments) requires nightly rustfmt.
      # We intentionally use nightly for *formatting only*; all builds/tests remain on stable/MSRV jobs.
      # Install stable first (rustup), then nightly with retries — nightly channel sync sometimes flakes on the network.
      - uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal
      - uses: ./.github/actions/install-nightly-toolchain
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Share registry/target across stable jobs (clippy/test/smoke) to improve cache hit rate on later runs.
          shared-key: incan-stable
      - uses: ./.github/actions/setup-rust-sccache
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  test-linux-shards:
    name: Test Suite Shard (ubuntu-latest, stable, slice ${{ matrix.partition }}/${{ matrix.total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4]
        total: [4]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install WASI target for vocab desugarers
        run: rustup target add wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: incan-stable
      - uses: ./.github/actions/setup-rust-sccache
      - uses: taiki-e/install-action@nextest
      - name: Run test shard
        run: cargo nextest run --all --profile ci --partition slice:${{ matrix.partition }}/${{ matrix.total }}
      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  test-linux:
    name: Test Suite (ubuntu-latest, stable)
    runs-on: ubuntu-latest
    needs: test-linux-shards
    if: ${{ always() }}
    steps:
      - name: Verify Ubuntu test shards
        run: |
          if [ "${{ needs.test-linux-shards.result }}" != "success" ]; then
            echo "test-linux-shards finished with ${{ needs.test-linux-shards.result }}"
            exit 1
          fi
          echo "ubuntu test shards passed"

  test-macos-shards:
    name: Test Suite Shard (macos-latest, stable, slice ${{ matrix.partition }}/${{ matrix.total }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4]
        total: [4]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install WASI target for vocab desugarers
        run: rustup target add wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: incan-stable
      - uses: ./.github/actions/setup-rust-sccache
      - uses: taiki-e/install-action@nextest
      - name: Run test shard
        run: cargo nextest run --all --profile ci --partition slice:${{ matrix.partition }}/${{ matrix.total }}
      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  test-macos:
    name: Test Suite (macos-latest, stable)
    runs-on: ubuntu-latest
    needs: test-macos-shards
    if: ${{ always() }}
    steps:
      - name: Verify macOS test shards
        run: |
          if [ "${{ needs.test-macos-shards.result }}" != "success" ]; then
            echo "test-macos-shards finished with ${{ needs.test-macos-shards.result }}"
            exit 1
          fi
          echo "macOS test shards passed"

  msrv-build:
    name: MSRV Build (1.92.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.92.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          components: clippy
      - name: Install WASI target for vocab desugarers
        run: rustup target add wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-rust-sccache
      - name: Cargo build (locked)
        run: cargo build --locked
      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  msrv-test-shards:
    name: MSRV Test Shard (1.92.0, slice ${{ matrix.partition }}/${{ matrix.total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4]
        total: [4]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.92.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          components: clippy
      - name: Install WASI target for vocab desugarers
        run: rustup target add wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-rust-sccache
      - uses: taiki-e/install-action@nextest
      - name: Cargo test shard (locked)
        run: cargo nextest run --locked --profile ci --partition slice:${{ matrix.partition }}/${{ matrix.total }}
      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  msrv:
    name: MSRV Build/Test (1.92.0)
    runs-on: ubuntu-latest
    needs:
      - msrv-build
      - msrv-test-shards
    if: ${{ always() }}
    steps:
      - name: Verify MSRV build and test shards
        run: |
          if [ "${{ needs.msrv-build.result }}" != "success" ]; then
            echo "msrv-build finished with ${{ needs.msrv-build.result }}"
            exit 1
          fi
          if [ "${{ needs.msrv-test-shards.result }}" != "success" ]; then
            echo "msrv-test-shards finished with ${{ needs.msrv-test-shards.result }}"
            exit 1
          fi
          echo "MSRV build and test shards passed"

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo deny
        run: cargo deny check

  udeps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal
      - uses: ./.github/actions/install-nightly-toolchain
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-rust-sccache
      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked
      - name: Run cargo udeps
        run: cargo +nightly udeps --all-targets
      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  smoke-release:
    name: Smoke Release Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Keep release-profile artifacts separate from the dev/test cache. Do not enable sccache
          # in this job: its GitHub-cache writes can prevent rust-cache from saving this target cache.
          shared-key: incan-stable-release
          cache-workspace-crates: "true"
      - name: Build release compiler once
        run: make smoke-test-release
      - name: Upload release compiler
        uses: actions/upload-artifact@v4
        with:
          name: incan-release-bin
          path: target/release/incan
          if-no-files-found: error
          retention-days: 1

  smoke-test-shards:
    name: Smoke Test Shard (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: smoke-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: canary
            make-target: smoke-test-canary
            wasi: false
            examples-timeout: 5
          - name: web-example
            make-target: smoke-test-web-example
            wasi: false
            examples-timeout: 5
          - name: nested-project
            make-target: smoke-test-nested-project-example
            wasi: false
            examples-timeout: 5
          - name: examples
            make-target: smoke-test-examples
            wasi: true
            examples-timeout: 20
          - name: benchmarks
            make-target: smoke-test-benchmarks-incan
            wasi: true
            examples-timeout: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: incan-stable
          cache-targets: false
      - uses: ./.github/actions/setup-rust-sccache
      - name: Install WASI target for vocab desugarers
        if: ${{ matrix.wasi }}
        run: rustup target add wasm32-wasip1
      - name: Download release compiler
        uses: actions/download-artifact@v4
        with:
          name: incan-release-bin
          path: target/release
      - name: Restore executable bit
        run: chmod +x target/release/incan
      - name: Run smoke shard
        run: make ${{ matrix.make-target }}
        env:
          INCAN_EXAMPLES_TIMEOUT: ${{ matrix.examples-timeout }}
      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs:
      - smoke-release
      - smoke-test-shards
    if: ${{ always() }}
    steps:
      - name: Verify smoke jobs
        run: |
          if [ "${{ needs.smoke-release.result }}" != "success" ]; then
            echo "smoke-release finished with ${{ needs.smoke-release.result }}"
            exit 1
          fi
          if [ "${{ needs.smoke-test-shards.result }}" != "success" ]; then
            echo "smoke-test-shards finished with ${{ needs.smoke-test-shards.result }}"
            exit 1
          fi
          echo "smoke jobs passed"

  generate-rust-docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-rust-sccache
      - name: Build docs
        run: cargo doc --no-deps
      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  docs-site:
    name: Docs Site Build (MkDocs)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workspaces/docs-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docs.txt
      - name: Build docs site (strict)
        run: python -m mkdocs build --strict

  generated-reference:
    name: Generated Reference Up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-rust-sccache
      - name: Regenerate language reference
        run: cargo run -p incan_core --bin generate_lang_reference
      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true
      - name: Verify no diff
        run: git diff --exit-code workspaces/docs-site/docs/language/reference/language.md
