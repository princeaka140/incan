name: Docs Site Deploy

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy (GitHub Pages via mike)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workspaces/docs-site
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docs.txt

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy dev from main
        if: github.event_name != 'release'
        run: |
          export INCAN_DOCS_BASE_PREFIX="dev"
          python -m mkdocs build --strict
          mike deploy --push dev
          mike set-default --push dev

      - name: Deploy versioned docs from release
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # Strip monorepo prefix: incan-v0.1.0 → v0.1.0 → v0.1
          VERSION="${TAG#incan-}"
          MINOR="${VERSION%.*}"
          export INCAN_DOCS_BASE_PREFIX="${MINOR}"
          python -m mkdocs build --strict
          mike deploy --push "${MINOR}"

