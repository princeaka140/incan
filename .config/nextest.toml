# cargo-nextest configuration for the Incan compiler workspace.
# See https://nexte.st/docs/configuration/ for full reference.

[store]
dir = "target/nextest"

[test-groups]
nested-cargo = { max-threads = 12 }

[profile.default]
# Fail fast: stop after the first test failure during local development.
fail-fast = true
# Status bar style for local terminal.
status-level = "pass"
# Give subprocess-heavy tests (rust-inspect / cargo metadata) enough time to exit
# before classifying the run as LEAK.
leak-timeout = "2s"

[profile.ci]
# In CI, run all tests even after a failure to collect the full picture.
fail-fast = false
status-level = "slow"
final-status-level = "slow"
slow-timeout = "30s"
leak-timeout = "2s"

[[profile.default.overrides]]
filter = 'binary_id(incan::integration_tests) | binary_id(incan::cli_integration) | binary_id(incan::std_encoding_algorithm_modules) | binary_id(incan::generated_rust_artifact_tests) | binary_id(incan::generated_rust_callability_artifact_tests) | binary_id(incan::generated_rust_native_consumer_tests)'
test-group = 'nested-cargo'

[[profile.ci.overrides]]
filter = 'binary_id(incan::integration_tests) | binary_id(incan::cli_integration) | binary_id(incan::std_encoding_algorithm_modules) | binary_id(incan::generated_rust_artifact_tests) | binary_id(incan::generated_rust_callability_artifact_tests) | binary_id(incan::generated_rust_native_consumer_tests)'
test-group = 'nested-cargo'
