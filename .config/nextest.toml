# cargo-nextest configuration for the Incan compiler workspace.
# See https://nexte.st/docs/configuration/ for full reference.

[store]
dir = "target/nextest"

[profile.default]
# Fail fast: stop after the first test failure during local development.
fail-fast = true
# Status bar style for local terminal.
status-level = "pass"
# Give subprocess-heavy tests (rust-inspect / cargo metadata) enough time to exit
# before classifying the run as LEAK.
leak-timeout = "2s"

[profile.ci]
# In CI, run all tests even after a failure to collect the full picture.
fail-fast = false
status-level = "slow"
final-status-level = "slow"
slow-timeout = "30s"
leak-timeout = "2s"
